<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銀行支店暗記テスト</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>銀行支店暗記テスト</h1>

        <!-- ホーム画面 -->
        <div id="start-screen">

            <button id="branch-list-btn">
                支店一覧を見る
            </button>

            <div class="setting-group">

                <h2>出題順</h2>

                <label>
                    <input type="radio" name="order" value="random" checked>
                    ランダム（適当）
                </label>

                <label>
                    <input type="radio" name="order" value="sequential">
                    店番順
                </label>

                <label>
                    <input type="radio" name="order" value="randomSequential">
                    ランダム（店番順）
                </label>

            </div>

            <div class="setting-group">

                <h2>出題モード</h2>

                <label>
                    <input type="radio" name="mode" value="nameToCode" checked>
                    支店名 → 店番
                </label>

                <label>
                    <input type="radio" name="mode" value="codeToName">
                    店番 → 支店名（逆クイズ）
                </label>

            </div>

            <div class="setting-group">

                <h2>問題数</h2>

                <label>
                    <input type="radio" name="questionCount" value="10" checked>
                    10問
                </label>

                <label>
                    <input type="radio" name="questionCount" value="20">
                    20問
                </label>

                <label>
                    <input type="radio" name="questionCount" value="all">
                    全問
                </label>

            </div>

            <button id="start-btn">
                テスト開始
            </button>

        </div>

        <!-- 支店一覧画面 -->
        <div id="branch-list-screen" class="hidden">

            <h2>支店一覧</h2>

            <table id="branch-table">
                <thead>
                    <tr>
                        <th>店番</th>
                        <th>支店名</th>
                        <th>ふりがな</th>
                    </tr>
                </thead>
                <tbody id="branch-table-body"></tbody>
            </table>

            <button id="back-home-btn">
                ホームへ戻る
            </button>

        </div>

        <!-- 問題画面 -->
        <div id="quiz-screen" class="hidden">

            <p id="progress">問題 1 / 10</p>

            <div class="question-box">
                <h2 id="question-title">支店名</h2>
                <p id="question"></p>
            </div>

            <input type="text" id="answer" placeholder="回答を入力" autocomplete="off">

            <button id="submit-btn">回答</button>

        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden">

            <h2>結果</h2>

            <p id="score"></p>
            <p id="rate"></p>

            <hr>

            <h3>正解した問題</h3>
            <ul id="correct-list"></ul>

            <hr>

            <h3>間違えた問題</h3>
            <ul id="mistake-list"></ul>

            <div class="button-group">

                <button id="restart-btn">再挑戦</button>

                <button id="retry-mistake-btn">間違えた問題だけ再挑戦</button>

                <button id="home-btn">ホーム</button>

            </div>

        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
